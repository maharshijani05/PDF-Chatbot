description: RAG chatbot evaluation via LLM judge

evaluateOptions:
  maxConcurrency: 1

prompts:
  - "{{question}}"

providers:
  # Full pipeline (RAG + LLM judge) — capability tests
  - id: python:evals/promptfoo/provider.py
    label: rag_capability

  # RAG only (no judge) — regression tests
  - id: python:evals/promptfoo/provider.py
    label: rag_regression
    config:
      skip_judge: true

tests:
  - file://evals/promptfoo/tests_regression.json
  - file://evals/promptfoo/tests_capability.json

defaultTest:
  assert:
    - type: not-contains
      value: "```"
      description: No markdown fences in output

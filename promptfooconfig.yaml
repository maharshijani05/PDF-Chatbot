description: RAG chatbot evaluation via LLM judge

evaluateOptions:
  maxConcurrency: 1  # prevents rate limit bursts on free tier

prompts:
  - "{{question}}"

providers:
  - id: python:evals/promptfoo_provider.py
    label: rag_strict
    config:
      variant: strict

  - id: python:evals/promptfoo_provider.py
    label: rag_concise
    config:
      variant: concise

tests:
  - file://evals/tests_regression.json
  - file://evals/tests_capability.json

defaultTest:
  assert:
    - type: not-contains
      value: "```"
      description: No markdown fences in output
